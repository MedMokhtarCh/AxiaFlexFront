services:
  - type: web
    name: axiaflex-backend
    runtime: node
    rootDir: Backend
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /pos/products
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: axiaflex-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: axiaflex-db
    plan: free
