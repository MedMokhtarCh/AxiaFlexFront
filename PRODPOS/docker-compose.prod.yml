services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT}:5432"

  backend:
    build:
      context: ..
      dockerfile: PRODPOS/Backend.Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3003
      TZ: ${TZ}
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      NACEF_MODE: ${NACEF_MODE}
      NACEF_AUTO_BOOTSTRAP: ${NACEF_AUTO_BOOTSTRAP}
      SIC_BASE_URL: http://backend:3003/sic/external
      NACEF_IMDF: ${NACEF_IMDF}
    ports:
      - "${BACKEND_PORT}:3003"

  frontend:
    build:
      context: ..
      dockerfile: PRODPOS/Frontend.Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  prod_pgdata:
